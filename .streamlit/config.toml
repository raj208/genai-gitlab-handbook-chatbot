[server]
# Disable file watcher — critical on OneDrive folders where inotify/polling is slow
fileWatcherType = "none"
headless = true
maxUploadSize = 200

[browser]
gatherUsageStats = false

[runner]
fastReruns = true

[theme]
base = "dark"
primaryColor = "#7C3AED"
backgroundColor = "#0F0F1A"
secondaryBackgroundColor = "#1A1A2E"
textColor = "#E2E8F0"
font = "sans serif"
